<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>병원 광고 영상 레퍼런스</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>병원 광고 영상 레퍼런스</h1>
  <p class="subtitle">레퍼런스 영상과 견적 정보를 한눈에</p>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="gallery">레퍼런스 갤러리</button>
    <button class="tab-btn" data-tab="estimate">견적 정보</button>
    <button class="tab-btn" data-tab="request">견적 요청</button>
  </nav>
</header>

<main>
  <!-- 갤러리 탭 -->
  <section id="gallery" class="tab-panel active">
    <div class="controls">
      <input type="text" id="searchInput" placeholder="제목, 키워드로 검색...">
      <select id="categoryFilter"><option value="">전체 분류</option></select>
      <select id="formatFilter">
        <option value="">전체 형식</option>
        <option value="Long-form">Long-form</option>
        <option value="Shorts">Shorts</option>
      </select>
      <span id="resultCount" class="result-count"></span>
    </div>
    <div class="section-block">
      <div class="section-label">
        <span class="section-dot longform"></span> Long-form
        <span id="longformCount" class="section-count"></span>
      </div>
      <div id="longformGrid" class="card-grid"></div>
    </div>

    <div class="section-block">
      <div class="section-label">
        <span class="section-dot shorts"></span> Shorts
        <span id="shortsCount" class="section-count"></span>
      </div>
      <div id="shortsGrid" class="card-grid shorts-grid"></div>
    </div>
  </section>

  <!-- 견적 정보 탭 -->
  <section id="estimate" class="tab-panel">
    <div class="stat-row" id="statRow"></div>

    <h2>활용 메모</h2>
    <div class="memo-grid" id="memoGrid"></div>

    <h2>패키지별 단가표</h2>
    <div id="packageAccordion" class="package-accordion"></div>

    <h2>견적 산정 기준</h2>
    <div class="table-wrap">
      <table id="criteriaTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

  <!-- 견적 요청 탭 -->
  <section id="request" class="tab-panel">
    <div class="request-wrap">
      <div class="request-header">
        <h2>견적 요청</h2>
        <p>아래 양식을 작성해 주시면 영업일 기준 1~2일 내로 연락드립니다.</p>
      </div>

      <form id="requestForm" class="request-form">

        <div class="form-row two-col">
          <div class="form-group">
            <label>병원명 <span class="req">*</span></label>
            <input type="text" name="병원명" placeholder="예: 강남 OO의원" required>
          </div>
          <div class="form-group">
            <label>원장님 성함 <span class="req">*</span></label>
            <input type="text" name="원장님_성함" placeholder="홍길동" required>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label>연락처 <span class="req">*</span></label>
            <input type="tel" name="연락처" placeholder="010-0000-0000" required>
          </div>
          <div class="form-group">
            <label>이메일 <span class="req">*</span></label>
            <input type="email" name="이메일" placeholder="example@email.com" required>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label>병원 진료과목</label>
            <select name="진료과목">
              <option value="">선택해주세요</option>
              <option>피부과</option>
              <option>성형외과</option>
              <option>치과</option>
              <option>정형외과</option>
              <option>안과</option>
              <option>비뇨의학과</option>
              <option>산부인과</option>
              <option>내과/가정의학과</option>
              <option>기타</option>
            </select>
          </div>
          <div class="form-group">
            <label>희망 영상 형식</label>
            <select name="영상_형식">
              <option value="">선택해주세요</option>
              <option>Long-form (1분 이상, 유튜브·홍보)</option>
              <option>Shorts (60초 이하, SNS·릴스)</option>
              <option>둘 다 필요</option>
              <option>아직 모름</option>
            </select>
          </div>
        </div>

        <div class="form-row two-col">
          <div class="form-group">
            <label>예산 범위</label>
            <select name="예산_범위">
              <option value="">선택해주세요</option>
              <option>200만원 이하</option>
              <option>200 ~ 500만원</option>
              <option>500 ~ 1,000만원</option>
              <option>1,000만원 이상</option>
              <option>미정 / 상담 후 결정</option>
            </select>
          </div>
          <div class="form-group">
            <label>제작 희망 시기</label>
            <select name="제작_희망_시기">
              <option value="">선택해주세요</option>
              <option>1개월 이내</option>
              <option>2 ~ 3개월</option>
              <option>3개월 이후</option>
              <option>미정</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>참고한 레퍼런스 영상</label>
          <input type="text" name="참고_레퍼런스" placeholder="예: 3번 영상, 7번 영상처럼 원장님 출연 스타일로 원합니다">
        </div>

        <div class="form-group">
          <label>요청 내용 <span class="req">*</span></label>
          <textarea name="요청_내용" rows="5" placeholder="원하시는 영상 콘셉트, 타깃 환자, 강조하고 싶은 시술이나 병원 강점 등을 자유롭게 적어주세요." required></textarea>
        </div>

        <div class="form-group check-group">
          <label class="checkbox-label">
            <input type="checkbox" name="개인정보_동의" required>
            <span>개인정보 수집 및 이용에 동의합니다. <small>(성명, 연락처, 이메일을 견적 상담 목적으로만 사용합니다)</small></span>
          </label>
        </div>

        <button type="submit" class="submit-btn">견적 요청 보내기</button>
      </form>

      <div id="formSuccess" class="form-success" style="display:none;">
        <div class="success-icon">✓</div>
        <h3>견적 요청이 접수되었습니다!</h3>
        <p>영업일 기준 1~2일 내로 연락드리겠습니다.</p>
      </div>
    </div>
  </section>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
